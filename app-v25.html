<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FactPulse v25 All In One</title>
<style>
:root{--bg:#050609;--card:#11141b;--line:#2b313d;--text:#f6f7fb;--muted:#b8bfcc;--green:#18f038;--soft:#1d222c}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#0b2b10,#050609 36%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;font-weight:750}
.app{max-width:1500px;margin:0 auto;padding:16px 16px 96px}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border:2px solid var(--green);border-radius:16px;display:grid;place-items:center;color:var(--green);background:#07100a;font-size:25px}.brand p{margin:0;color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase}.brand h1{margin:2px 0 0;font-size:28px}.pill,.tabs button,.open{border:1px solid var(--line);background:var(--soft);border-radius:18px;padding:14px 16px;color:var(--text);text-decoration:none;font-weight:1000;text-align:center}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.tabs button.active,.primary{background:var(--green);color:#031007;border-color:var(--green)}.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{background:rgba(17,20,27,.96);border:1px solid var(--line);border-radius:24px;overflow:hidden;min-height:78vh}.head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.head h2{margin:0;font-size:24px}.head p{margin:4px 0 0;color:var(--muted);line-height:1.35}.frame-wrap{height:calc(100vh - 210px);min-height:640px;background:#020403}.frame-wrap iframe{width:100%;height:100%;border:0;background:#050609}.notice{background:#070a0f;border:1px solid var(--line);border-radius:18px;padding:14px;margin:0 0 14px;line-height:1.45;color:var(--muted)}.mobile-only{display:none}.desktop-only{display:grid}.bottom{position:fixed;left:12px;right:12px;bottom:12px;display:none;grid-template-columns:1fr 1fr;gap:10px;background:rgba(5,6,9,.88);border:1px solid var(--line);border-radius:22px;padding:10px;backdrop-filter:blur(10px);z-index:10}.bottom button{border:0;border-radius:18px;padding:14px;font-weight:1000;background:var(--soft);color:var(--text)}.bottom button.active{background:var(--green);color:#031007}@media(max-width:980px){.layout{grid-template-columns:1fr}.desktop-only{display:none}.mobile-only{display:block}.bottom{display:grid}.tabs{grid-template-columns:1fr 1fr}.panel{min-height:calc(100vh - 190px)}.frame-wrap{height:calc(100vh - 245px);min-height:520px}.panel.hide{display:none}.top{align-items:flex-start}.brand h1{font-size:24px}.pill{padding:11px 13px}}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div class="brand"><div class="logo">F</div><div><p>all in one studio</p><h1>FactPulse v25</h1></div></div>
  <a class="pill" href="create-v21.html">Create</a>
</header>
<div class="notice">Search clips on the left, then render on the right. The timeline saves in this browser, so Render reads the clips you select.</div>
<div class="tabs">
  <button class="active" id="showBoth" type="button">Both</button>
  <button id="showClips" type="button">Clips</button>
  <button id="showRender" type="button">Render</button>
  <button id="refreshRender" class="primary" type="button">Refresh Render</button>
</div>
<main class="layout" id="layout">
  <section class="panel" id="clipsPanel">
    <div class="head"><div><h2>Clips</h2><p>Search, preview, and Use Clip.</p></div><a class="open" href="clips-v25.html" target="_blank">Open</a></div>
    <div class="frame-wrap"><iframe id="clipsFrame" src="clips-v25.html" title="Clips v25"></iframe></div>
  </section>
  <section class="panel" id="renderPanel">
    <div class="head"><div><h2>Render</h2><p>Did You Know or Clips Only + Captions.</p></div><a class="open" href="render-v25.html" target="_blank">Open</a></div>
    <div class="frame-wrap"><iframe id="renderFrame" src="render-v25.html" title="Render v25"></iframe></div>
  </section>
</main>
<nav class="bottom">
  <button class="active" id="mobileClips" type="button">Clips</button>
  <button id="mobileRender" type="button">Render</button>
</nav>
</div>
<script>
function $(x){return document.querySelector(x)}
function reloadRender(){const f=$('#renderFrame');f.src='render-v25.html?reload='+(Date.now())}
function setView(v){
  const clips=$('#clipsPanel'),render=$('#renderPanel'),layout=$('#layout');
  $('#showBoth').classList.toggle('active',v==='both');
  $('#showClips').classList.toggle('active',v==='clips');
  $('#showRender').classList.toggle('active',v==='render');
  $('#mobileClips').classList.toggle('active',v!=='render');
  $('#mobileRender').classList.toggle('active',v==='render');
  if(window.innerWidth<=980){clips.classList.toggle('hide',v==='render');render.classList.toggle('hide',v!=='render')}
  else{clips.classList.remove('hide');render.classList.remove('hide')}
  if(v==='render')reloadRender();
}
$('#showBoth').onclick=()=>setView('both');
$('#showClips').onclick=()=>setView('clips');
$('#showRender').onclick=()=>setView('render');
$('#refreshRender').onclick=reloadRender;
$('#mobileClips').onclick=()=>setView('clips');
$('#mobileRender').onclick=()=>setView('render');
window.addEventListener('resize',()=>setView(document.querySelector('#mobileRender').classList.contains('active')?'render':'both'));
setView(window.innerWidth<=980?'clips':'both');
</script>
</body>
</html>
