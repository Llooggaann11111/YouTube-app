<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FactPulse v37 Download Fix</title>
<style>
:root{--bg:#050609;--green:#2cff54;--line:rgba(255,255,255,.12);--muted:#a7b0bb;--text:#f7f9fc;--gold:#ffd166}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}button,a{font:inherit}#base{position:fixed;inset:0;width:100%;height:100dvh;border:0;background:#060809}.bar{position:fixed;left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:200;display:grid;grid-template-columns:1fr 1fr;gap:10px;pointer-events:none}.bar button{pointer-events:auto;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(17,24,32,.96),rgba(7,10,14,.98));color:white;padding:15px 12px;font-weight:1000;box-shadow:0 14px 34px rgba(0,0,0,.42)}.bar .primary{background:linear-gradient(180deg,#62ff5c,#22ef45);color:#061006;border-color:transparent}.modal{position:fixed;inset:0;display:none;place-items:center;z-index:300;background:rgba(0,0,0,.92);padding:16px}.modal.show{display:grid}.card{width:min(100%,470px);max-height:94dvh;overflow:auto;background:linear-gradient(180deg,rgba(18,24,31,.99),rgba(6,9,13,.99));border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.65)}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border:2px solid var(--green);border-radius:16px;display:grid;place-items:center;color:var(--green);font-weight:1000;background:#07100a}.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-weight:1000}.title{font-size:24px;font-weight:1000;letter-spacing:-.04em}.close{border:0;border-radius:16px;background:#202734;color:white;padding:12px 14px;font-weight:1000}.preview{width:100%;aspect-ratio:9/16;background:#000;border-radius:22px;overflow:hidden;border:1px solid var(--line)}.preview canvas,.preview img,.preview video{width:100%;height:100%;object-fit:cover;display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn{border:1px solid var(--line);border-radius:16px;background:#171e28;color:white;padding:14px 12px;font-weight:1000;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}.btn.primary{background:linear-gradient(180deg,#62ff5c,#22ef45);color:#061006;border-color:transparent}.btn.gold{color:var(--gold)}.out{white-space:pre-wrap;background:#070b10;border:1px solid var(--line);border-radius:16px;padding:12px;color:#dbe3df;font-size:13px;line-height:1.4;margin-top:12px;max-height:210px;overflow:auto}.toast{position:fixed;left:18px;right:18px;bottom:calc(env(safe-area-inset-bottom,0px) + 92px);z-index:400;background:#050805;border:1px solid rgba(44,255,84,.42);border-radius:18px;color:var(--green);padding:14px;text-align:center;font-weight:1000;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}@media(min-width:620px){.bar{left:50%;right:auto;width:520px;transform:translateX(-50%)}}@media(max-width:390px){.bar,.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<iframe id="base" src="app-v35.html?v=37"></iframe>
<div class="bar"><button class="primary" id="saveRender">Save Render</button><button id="openAI">AI Studio</button></div>
<div class="modal" id="modal"><div class="card"><div class="top"><div class="brand"><div class="logo">↓</div><div><div class="eyebrow">v37 fixed save</div><div class="title">Save Render</div></div></div><button class="close" id="close">Close</button></div><div class="preview" id="preview"></div><div class="grid"><button class="btn primary" id="sharePng">Share PNG</button><button class="btn" id="openPng">Open Image</button></div><div class="grid"><button class="btn gold" id="downloadPng">Download PNG</button><button class="btn" id="copyJson">Copy Project</button></div><div class="grid"><button class="btn" id="downloadJson">Download Project</button><button class="btn" id="tryVideo">Try Video</button></div><div class="out" id="msg">Ready.</div></div></div>
<div class="toast" id="toast">Ready</div>
<script>
const base=document.getElementById('base'),modal=document.getElementById('modal'),preview=document.getElementById('preview'),msg=document.getElementById('msg'),toastEl=document.getElementById('toast');
const STORE_KEYS=['factpulse-v32-clean','factpulse-v31-clean','factpulse-v16'];let pngBlob=null,pngUrl='',jsonBlob=null,jsonUrl='',videoUrl='';
function toast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),2200)}
function clean(v){return String(v||'').trim().replace(/\s+/g,' ')}
function readStore(){for(const k of STORE_KEYS){try{const v=JSON.parse(localStorage.getItem(k)||'{}');if(v&&Object.keys(v).length)return v}catch(e){}}return{}}
function firstClip(s){return (s.timeline&&s.timeline[0])||(s.clips&&s.clips[0])||null}
function allDocs(){const out=[];function walk(win){try{const d=win.document;if(!d)return;out.push(d);d.querySelectorAll('iframe').forEach(f=>{try{if(f.contentWindow)walk(f.contentWindow)}catch(e){}})}catch(e){}}walk(base.contentWindow);return out}
function patch(){allDocs().forEach(d=>{if(!d||d.getElementById('v37Patch'))return;const st=d.createElement('style');st.id='v37Patch';st.textContent='#clearAI,.btn.red{display:none!important}.toast{bottom:160px!important}.app{padding-bottom:150px!important}';d.head.appendChild(st);const clear=d.getElementById('clearAI');if(clear)clear.remove();const exp=d.getElementById('exportBtn');if(exp&&!exp.dataset.v37){exp.dataset.v37='1';exp.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();buildPanel();toast('Save panel opened')},true)}})}
function wrap(ctx,text,x,y,w,lh,max){let words=clean(text).split(' '),line='',lines=[];for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>w&&line){lines.push(line);line=word+' '}else line=test}lines.push(line);lines.slice(0,max).forEach((l,i)=>ctx.fillText(l.trim(),x,y+i*lh))}
function drawFrame(canvas){const s=readStore(),c=firstClip(s)||{};const ctx=canvas.getContext('2d');canvas.width=720;canvas.height=1280;const subject=clean(s.subject)||'FactPulse';const caption=clean(s.caption)||clean(s.fact)||c.title||'Render preview';ctx.fillStyle='#050809';ctx.fillRect(0,0,720,1280);const grad=ctx.createLinearGradient(0,0,0,1280);grad.addColorStop(0,'#102015');grad.addColorStop(.55,'#050809');grad.addColorStop(1,'#0b120d');ctx.fillStyle=grad;ctx.fillRect(0,0,720,1280);ctx.fillStyle='#2cff54';ctx.font='900 54px system-ui,-apple-system,Segoe UI';ctx.textAlign='center';ctx.fillText('FactPulse',360,105);ctx.font='900 38px system-ui,-apple-system,Segoe UI';wrap(ctx,subject,360,170,620,46,3);ctx.strokeStyle='#2cff54';ctx.lineWidth=5;ctx.strokeRect(70,330,580,510);ctx.fillStyle='rgba(16,24,31,.92)';ctx.fillRect(72,332,576,506);ctx.fillStyle='#ffffff';ctx.font='900 42px system-ui,-apple-system,Segoe UI';wrap(ctx,caption,360,500,500,52,5);ctx.fillStyle='#2cff54';ctx.fillRect(90,895,540,8);ctx.fillStyle='#dbe3df';ctx.font='700 25px system-ui,-apple-system,Segoe UI';ctx.fillText(c.source?('Source: '+c.source):'Ready for Short',360,950);ctx.fillStyle='rgba(44,255,84,.12)';ctx.fillRect(90,1010,540,95);ctx.fillStyle='#2cff54';ctx.font='800 29px system-ui,-apple-system,Segoe UI';ctx.fillText(c.embed?'Preview-only source':'Download-ready frame',360,1068);ctx.fillStyle='#ffffff';ctx.font='700 24px system-ui,-apple-system,Segoe UI';ctx.fillText(new Date().toLocaleDateString(),360,1212)}
function revoke(){[pngUrl,jsonUrl,videoUrl].forEach(u=>{if(u&&u.startsWith('blob:'))URL.revokeObjectURL(u)});pngUrl=jsonUrl=videoUrl=''}
async function canvasBlob(canvas){return new Promise(res=>canvas.toBlob(b=>res(b),'image/png',1))}
async function buildPanel(){modal.classList.add('show');revoke();preview.innerHTML='<canvas id="canvas"></canvas>';const canvas=document.getElementById('canvas');drawFrame(canvas);pngBlob=await canvasBlob(canvas);pngUrl=URL.createObjectURL(pngBlob);const pack={version:'v37',createdAt:new Date().toISOString(),project:readStore()};jsonBlob=new Blob([JSON.stringify(pack,null,2)],{type:'application/json'});jsonUrl=URL.createObjectURL(jsonBlob);msg.textContent='Save is ready. On iPhone, use Share PNG first. If Download does not open Files, tap Open Image, then long-press the image and choose Save to Photos.';}
function forceDownload(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';document.body.appendChild(a);a.click();setTimeout(()=>a.remove(),300)}
async function sharePng(){if(!pngBlob)await buildPanel();try{const file=new File([pngBlob],'factpulse-render.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'FactPulse Render'});toast('Share sheet opened');return}}catch(e){}window.open(pngUrl,'_blank');msg.textContent='Share was not available. Image opened in a new tab. Long-press it and save to Photos.';toast('Opened image')}
function openImage(){if(!pngUrl){buildPanel().then(openImage);return}window.open(pngUrl,'_blank');msg.textContent='Image opened. On iPhone, long-press the image and choose Save to Photos.';toast('Image opened')}
function downloadPng(){if(!pngUrl){buildPanel().then(downloadPng);return}forceDownload(pngUrl,'factpulse-render.png');msg.textContent='Download started. If iPhone ignores it, use Share PNG or Open Image.';toast('Download started')}
function downloadJson(){if(!jsonUrl){buildPanel().then(downloadJson);return}forceDownload(jsonUrl,'factpulse-project-pack.json');toast('Project download started')}
async function copyJson(){const pack={version:'v37',createdAt:new Date().toISOString(),project:readStore()};try{await navigator.clipboard.writeText(JSON.stringify(pack,null,2));toast('Project copied')}catch(e){msg.textContent=JSON.stringify(pack,null,2);toast('Copy blocked, shown below')}}
function supportedMime(){const list=['video/mp4;codecs="avc1.42E01E,mp4a.40.2"','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];for(const m of list){try{if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m))return m}catch(e){}}return''}
function tryVideo(){const mime=supportedMime();const canvas=document.createElement('canvas');if(!mime||!canvas.captureStream||!window.MediaRecorder){msg.textContent='Video export is not supported in this browser. Use Share PNG. On iPhone this is normal.';toast('Video not supported');return}canvas.width=720;canvas.height=1280;preview.innerHTML='';preview.appendChild(canvas);const stream=canvas.captureStream(24),ctx=canvas.getContext('2d');let chunks=[],rec;try{rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:4500000})}catch(e){msg.textContent='Video recorder failed. Use Share PNG.';return}rec.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data)};rec.onstop=()=>{const blob=new Blob(chunks,{type:mime});videoUrl=URL.createObjectURL(blob);preview.innerHTML='<video controls playsinline src="'+videoUrl+'"></video>';const ext=mime.includes('mp4')?'mp4':'webm';msg.innerHTML='Video built.<br><br><a class="btn primary" href="'+videoUrl+'" download="factpulse-render.'+ext+'" target="_blank">Download Video</a>';toast('Video built')};rec.start(250);let f=0,total=120;function step(){drawFrame(canvas);ctx.fillStyle='#2cff54';ctx.fillRect(80,1160,560*(f/total),10);f++;if(f<=total)requestAnimationFrame(step);else rec.stop()}step();msg.textContent='Building video. Do not close this panel.'}
document.getElementById('saveRender').onclick=buildPanel;document.getElementById('sharePng').onclick=sharePng;document.getElementById('openPng').onclick=openImage;document.getElementById('downloadPng').onclick=downloadPng;document.getElementById('downloadJson').onclick=downloadJson;document.getElementById('copyJson').onclick=copyJson;document.getElementById('tryVideo').onclick=tryVideo;document.getElementById('close').onclick=()=>{modal.classList.remove('show');preview.innerHTML=''};document.getElementById('openAI').onclick=()=>{for(const d of allDocs()){const b=d.getElementById('openAI')||d.getElementById('openPack')||d.getElementById('open');if(b){b.click();toast('AI panel opened');return}}toast('AI panel ready')};base.addEventListener('load',()=>{setTimeout(patch,500);setInterval(patch,1500)});setInterval(patch,2500);
</script>
</body>
</html>
