<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FactPulse v36</title>
<style>
:root{--bg:#050609;--green:#2cff54;--line:rgba(255,255,255,.12);--muted:#a7b0bb;--text:#f7f9fc}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}button,a{font:inherit}#base{position:fixed;inset:0;width:100%;height:100dvh;border:0;background:#060809}.download-fab{position:fixed;left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:200;display:grid;grid-template-columns:1fr 1fr;gap:10px;pointer-events:none}.download-fab button{pointer-events:auto;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(17,24,32,.96),rgba(7,10,14,.98));color:white;padding:15px 12px;font-weight:1000;box-shadow:0 14px 34px rgba(0,0,0,.42)}.download-fab .primary{background:linear-gradient(180deg,#62ff5c,#22ef45);color:#061006;border-color:transparent}.modal{position:fixed;inset:0;display:none;place-items:center;z-index:300;background:rgba(0,0,0,.92);padding:16px}.modal.show{display:grid}.card{width:min(100%,470px);max-height:94dvh;overflow:auto;background:linear-gradient(180deg,rgba(18,24,31,.99),rgba(6,9,13,.99));border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.65)}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border:2px solid var(--green);border-radius:16px;display:grid;place-items:center;color:var(--green);font-weight:1000;background:#07100a}.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-weight:1000}.title{font-size:24px;font-weight:1000;letter-spacing:-.04em}.close{border:0;border-radius:16px;background:#202734;color:white;padding:12px 14px;font-weight:1000}.preview{width:100%;aspect-ratio:9/16;background:#000;border-radius:22px;overflow:hidden;border:1px solid var(--line)}.preview canvas,.preview img,.preview video{width:100%;height:100%;object-fit:cover;display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn{border:1px solid var(--line);border-radius:16px;background:#171e28;color:white;padding:14px 12px;font-weight:1000;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}.btn.primary{background:linear-gradient(180deg,#62ff5c,#22ef45);color:#061006;border-color:transparent}.btn.gold{color:#ffd166}.out{white-space:pre-wrap;background:#070b10;border:1px solid var(--line);border-radius:16px;padding:12px;color:#dbe3df;font-size:13px;line-height:1.4;margin-top:12px;max-height:210px;overflow:auto}.toast{position:fixed;left:18px;right:18px;bottom:calc(env(safe-area-inset-bottom,0px) + 92px);z-index:400;background:#050805;border:1px solid rgba(44,255,84,.42);border-radius:18px;color:var(--green);padding:14px;text-align:center;font-weight:1000;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}@media(min-width:620px){.download-fab{left:50%;right:auto;width:520px;transform:translateX(-50%)}}@media(max-width:390px){.download-fab,.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<iframe id="base" src="app-v35.html?v=36"></iframe>
<div class="download-fab"><button class="primary" id="downloadRender">Download Render</button><button id="openAI">AI Studio</button></div>
<div class="modal" id="modal"><div class="card"><div class="top"><div class="brand"><div class="logo">↓</div><div><div class="eyebrow">v36 download fix</div><div class="title">Render Export</div></div></div><button class="close" id="close">Close</button></div><div class="preview" id="preview"></div><div class="grid"><a class="btn primary" id="downloadPng">Download PNG</a><a class="btn" id="openPng" target="_blank">Open PNG</a></div><div class="grid"><a class="btn gold" id="downloadJson">Download Project</a><button class="btn" id="tryVideo">Try Video Export</button></div><div class="out" id="msg">Ready.</div></div></div>
<div class="toast" id="toast">Ready</div>
<script>
const base=document.getElementById('base'),modal=document.getElementById('modal'),preview=document.getElementById('preview'),msg=document.getElementById('msg'),toastEl=document.getElementById('toast');
const STORE_KEYS=['factpulse-v32-clean','factpulse-v31-clean','factpulse-v16'];
let lastPng='',lastJson='',lastVideo='';
function toast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),2200)}
function clean(v){return String(v||'').trim().replace(/\s+/g,' ')}
function readStore(){for(const k of STORE_KEYS){try{const v=JSON.parse(localStorage.getItem(k)||'{}');if(v&&Object.keys(v).length)return v}catch(e){}}return{}}
function allDocs(){const out=[];function walk(win){try{const d=win.document;if(!d)return;out.push(d);d.querySelectorAll('iframe').forEach(f=>{try{if(f.contentWindow)walk(f.contentWindow)}catch(e){}})}catch(e){}}walk(base.contentWindow);return out}
function hideClearAI(){allDocs().forEach(d=>{if(d.getElementById('v36Patch'))return;const st=d.createElement('style');st.id='v36Patch';st.textContent='#clearAI{display:none!important}.btn.red{display:none!important}.toast{bottom:160px!important}.app{padding-bottom:150px!important}';d.head.appendChild(st);const clear=d.getElementById('clearAI');if(clear)clear.remove();d.querySelectorAll('.card').forEach(card=>{if((card.textContent||'').includes('Clear AI Data')){card.querySelectorAll('.btn.red').forEach(x=>x.remove())}});const exportBtn=d.getElementById('exportBtn');if(exportBtn&&!exportBtn.dataset.v36){exportBtn.dataset.v36='1';exportBtn.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();buildDownload();toast('Download panel opened')},true)};});}
function firstClip(s){return (s.timeline&&s.timeline[0])||(s.clips&&s.clips[0])||null}
function drawFrame(canvas){const s=readStore(),c=firstClip(s)||{};const ctx=canvas.getContext('2d');canvas.width=720;canvas.height=1280;const subject=clean(s.subject)||'FactPulse';const caption=clean(s.caption)||clean(s.fact)||c.title||'Render preview';ctx.fillStyle='#050809';ctx.fillRect(0,0,720,1280);const grad=ctx.createLinearGradient(0,0,0,1280);grad.addColorStop(0,'#102015');grad.addColorStop(.5,'#050809');grad.addColorStop(1,'#0b120d');ctx.fillStyle=grad;ctx.fillRect(0,0,720,1280);ctx.fillStyle='#2cff54';ctx.font='900 54px system-ui,-apple-system,Segoe UI';ctx.textAlign='center';ctx.fillText('FactPulse',360,105);ctx.font='900 38px system-ui,-apple-system,Segoe UI';wrap(ctx,subject,360,170,620,46,3);ctx.strokeStyle='#2cff54';ctx.lineWidth=5;ctx.strokeRect(70,330,580,510);ctx.fillStyle='rgba(16,24,31,.92)';ctx.fillRect(72,332,576,506);ctx.fillStyle='#ffffff';ctx.font='900 42px system-ui,-apple-system,Segoe UI';wrap(ctx,caption,360,500,500,52,5);ctx.fillStyle='#2cff54';ctx.fillRect(90,895,540,8);ctx.fillStyle='#dbe3df';ctx.font='700 25px system-ui,-apple-system,Segoe UI';ctx.fillText(c.source?('Source: '+c.source):'Ready for Short',360,950);ctx.fillStyle='rgba(44,255,84,.12)';ctx.fillRect(90,1010,540,95);ctx.fillStyle='#2cff54';ctx.font='800 29px system-ui,-apple-system,Segoe UI';ctx.fillText(c.embed?'YouTube preview only':'Download-ready frame',360,1068);ctx.fillStyle='#ffffff';ctx.font='700 24px system-ui,-apple-system,Segoe UI';ctx.fillText(new Date().toLocaleDateString(),360,1212)}
function wrap(ctx,text,x,y,w,lh,max){let words=clean(text).split(' '),line='',lines=[];for(const word of words){const test=line+word+' ';if(ctx.measureText(test).width>w&&line){lines.push(line);line=word+' '}else line=test}lines.push(line);lines.slice(0,max).forEach((l,i)=>ctx.fillText(l.trim(),x,y+i*lh))}
function revoke(url){if(url&&url.startsWith('blob:'))URL.revokeObjectURL(url)}
function setDownload(a,url,name){a.href=url;a.download=name;a.setAttribute('target','_blank')}
function buildDownload(){modal.classList.add('show');revoke(lastJson);revoke(lastVideo);preview.innerHTML='<canvas id="canvas"></canvas>';const canvas=document.getElementById('canvas');drawFrame(canvas);lastPng=canvas.toDataURL('image/png');const s=readStore();lastJson=URL.createObjectURL(new Blob([JSON.stringify({version:'v36',createdAt:new Date().toISOString(),project:s},null,2)],{type:'application/json'}));setDownload(document.getElementById('downloadPng'),lastPng,'factpulse-render-frame.png');document.getElementById('openPng').href=lastPng;setDownload(document.getElementById('downloadJson'),lastJson,'factpulse-project-pack.json');const c=firstClip(s)||{};msg.textContent=(c.embed?'YouTube clips cannot be exported as a video file. This gives you a real downloadable PNG frame and project pack. Use Pixabay, Wikimedia, or other direct video sources for video export.':'Download is ready. PNG and project pack work on iPhone. Video export depends on browser support.');}
function supportedMime(){const list=['video/mp4;codecs="avc1.42E01E,mp4a.40.2"','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];for(const m of list){try{if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m))return m}catch(e){}}return''}
function tryVideo(){const mime=supportedMime();const canvas=document.createElement('canvas');if(!mime||!canvas.captureStream||!window.MediaRecorder){msg.textContent='This browser does not support direct video recording. Use Download PNG and Download Project. On iPhone, this is normal.';toast('Video not supported here');return}canvas.width=720;canvas.height=1280;preview.innerHTML='';preview.appendChild(canvas);const ctx=canvas.getContext('2d');const stream=canvas.captureStream(24);let chunks=[];let rec;try{rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:4500000})}catch(e){msg.textContent='Video recorder failed. Use PNG download.';return}rec.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data)};rec.onstop=()=>{revoke(lastVideo);const blob=new Blob(chunks,{type:mime});lastVideo=URL.createObjectURL(blob);preview.innerHTML='<video controls playsinline src="'+lastVideo+'"></video>';const a=document.createElement('a');a.className='btn primary';a.href=lastVideo;a.download='factpulse-render.'+(mime.includes('mp4')?'mp4':'webm');a.textContent='Download Video';a.target='_blank';msg.appendChild(document.createElement('br'));msg.appendChild(document.createElement('br'));msg.appendChild(a);toast('Video built')};rec.start(250);let f=0,total=120;function step(){drawFrame(canvas);ctx.fillStyle='#2cff54';ctx.fillRect(80,1160,560*(f/total),10);f++;if(f<=total)requestAnimationFrame(step);else rec.stop()}step();msg.textContent='Building video. Do not close this panel.'}
document.getElementById('downloadRender').onclick=buildDownload;document.getElementById('tryVideo').onclick=tryVideo;document.getElementById('close').onclick=()=>{modal.classList.remove('show');preview.innerHTML=''};document.getElementById('openAI').onclick=()=>{const docs=allDocs();let clicked=false;for(const d of docs){const b=d.getElementById('openAI')||d.getElementById('openPack')||d.getElementById('open');if(b){b.click();clicked=true;break}}toast(clicked?'AI panel opened':'AI panel ready')};base.addEventListener('load',()=>{setTimeout(hideClearAI,500);setInterval(hideClearAI,1400)});setInterval(hideClearAI,2000);
</script>
</body>
</html>
