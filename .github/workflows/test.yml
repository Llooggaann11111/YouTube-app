name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Frontend syntax check
        run: |
          node --check app-v16.js
          node --check app-v16-segment-fix.js
          node --check app-v16-smart-bridge.js
      - name: Python syntax check
        run: |
          python -m py_compile clip_ai_bot.py smart_media_bot.py media_intelligence.py youtube_upload_bot.py
      - name: Run Python tests
        run: |
          pytest -q
